<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://unpkg.com/rrweb-snapshot@1.1.8/dist/rrweb-snapshot.js"></script>
</head>
<body>
  <pre></pre>

  <script>
    function findStyles(node) {
      const tagName = node.tagName ? node.tagName.toLowerCase() : ''
      if (tagName === 'link') {
        return [node.attributes._cssText]
      }
      if (tagName === 'style') {
        return node.childNodes
          .map(styleChildNode => styleChildNode.textContent)
          .join('\n')
      }
      if (node.childNodes) {
        return node.childNodes
          .map(child => findStyles(child))
          .flat()
      }
      return []
    }

    var snapshot = rrwebSnapshot.snapshot(document)
    document.querySelector('pre').innerText = findStyles(snapshot[0]).join('\n')
  </script>
</body>
</html>
